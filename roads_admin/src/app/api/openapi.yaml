openapi: 3.0.3
info:
  title: Админка дороги
  description: Сервис для распознование дорожных знаков.
  version: 1.0.1
paths:
  /login:
    post:
      summary: Авторизация пользователя
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginUser'
      responses:
        '200':
          description: Пользователь авторизованн
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  login:
                    type: string
                  privilege_id:
                    type: integer
                  is_active:
                    type: boolean
        '401':
          description: Ошибка логина или пароля
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  is_active:
                    type: boolean
                  message:
                    type: string    

  /logout:
    post:
      summary: Выход
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutUser'
      responses:
        '200':
          description: Выход выполнен
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /users:
    get:
      description: Получение пользователей
      operationId: read_users
      responses:
        "200":
          description: OK!
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    post:
      description: Создание пользователя
      operationId: create_user
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                login:
                  type: string
                password:
                  type: string
                privilege_id:
                  type: integer
      responses:
        "201":
          description: OK!
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    put:
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      description: Обновление пользователя
      operationId: update_user
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                login:
                  type: string
                password:
                  type: string
                privilege_id:
                  type: integer
                is_active:
                  type: boolean
      responses:
        "200":
          description: OK!
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Запись не найдена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"

    delete:
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      description: Удаление пользователя
      operationId: delete_user
      responses:
        "204":
          description: OK!
          content:
            text/html; charset=utf-8:
              schema:
                nullable: true
        "404":
          description: Запись не найдена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404"

